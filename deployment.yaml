apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-app
  template:
    metadata:
      labels:
        app: inventory-app
    spec:
      containers:
      - name: inventory-app
        image: hasnaeelmir/inventory-app:v2   # <-- Le tag passe en v2
        imagePullPolicy: Always                  
        ports:
        - containerPort: 5000