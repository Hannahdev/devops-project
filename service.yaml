apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  type: NodePort
  selector:
    app: inventory-app
  ports:
    - name: http                 # 🔥 good practice
      protocol: TCP
      port: 80                  # external service port
      targetPort: 5000          # your app container port
      nodePort: 30007           # exposed node port (range: 30000–32767)